<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>통계 대시보드 | 수험생 학습 습관 자가진단</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="stats-page">

  <!-- 통계 헤더 -->
  <header class="stats-header">
    <div class="stats-header-inner">
      <div class="stats-header-left">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div>
          <h1 class="stats-title"><i class="fas fa-chart-bar"></i> 전체 통계 대시보드</h1>
          <p class="stats-subtitle">수험생 학습 습관 자가진단 통합 분석</p>
        </div>
      </div>
      <button class="btn-refresh" onclick="loadStats()">
        <i class="fas fa-sync-alt" id="refreshIcon"></i> 새로고침
      </button>
    </div>
  </header>

  <main class="stats-main">
    <!-- 로딩 -->
    <div id="loadingState" class="loading-state">
      <i class="fas fa-spinner fa-spin fa-2x"></i>
      <p>데이터를 불러오는 중...</p>
    </div>

    <!-- 에러 -->
    <div id="errorState" class="error-state" style="display:none;">
      <i class="fas fa-exclamation-circle fa-2x"></i>
      <p id="errorMsg">데이터를 불러오지 못했습니다.</p>
      <button onclick="loadStats()">다시 시도</button>
    </div>

    <!-- 컨텐츠 -->
    <div id="statsContent" style="display:none;">

      <!-- 시험종류/유형 필터 바 -->
      <section class="filter-bar-section">
        <div class="filter-bar">
          <div class="filter-group">
            <label class="filter-group-label"><i class="fas fa-pen-ruler"></i> 시험 유형</label>
            <div class="filter-btns" id="filterTypeBtns">
              <button class="filter-btn active" data-value="all" onclick="setFilterType('all')">전체</button>
              <button class="filter-btn" data-value="객관식" onclick="setFilterType('객관식')">
                <i class="fas fa-check-square"></i> 객관식
              </button>
              <button class="filter-btn" data-value="논술형·주관식" onclick="setFilterType('논술형·주관식')">
                <i class="fas fa-pen-nib"></i> 논술형·주관식
              </button>
            </div>
          </div>
          <div class="filter-group">
            <label class="filter-group-label"><i class="fas fa-graduation-cap"></i> 시험 종류</label>
            <div class="filter-btns filter-btns-wrap" id="filterCatBtns">
              <!-- JS로 렌더링 -->
            </div>
          </div>
        </div>
        <div class="filter-active-info" id="filterActiveInfo">
          <i class="fas fa-filter"></i> <span id="filterInfoText">전체 데이터 기준</span>
          <span class="filter-count-badge" id="filterCountBadge"></span>
        </div>
      </section>

      <!-- 시험종류/유형 응답자 현황 (JS로 동적 렌더) -->
      <div id="examBreakdownSection"></div>

      <!-- 요약 카드 -->
      <section class="summary-section">
        <div class="summary-card total">
          <div class="summary-icon"><i class="fas fa-users"></i></div>
          <div class="summary-info">
            <div class="summary-num" id="totalResponses">-</div>
            <div class="summary-label">총 응답자</div>
          </div>
        </div>
        <div class="summary-card danger">
          <div class="summary-icon"><i class="fas fa-exclamation-triangle"></i></div>
          <div class="summary-info">
            <div class="summary-num" id="avgDanger">-</div>
            <div class="summary-label">평균 위험 항목 수</div>
          </div>
        </div>
        <div class="summary-card top">
          <div class="summary-icon"><i class="fas fa-fire"></i></div>
          <div class="summary-info">
            <div class="summary-num" id="topDangerPct">-</div>
            <div class="summary-label">최고 위험 항목 비율</div>
          </div>
        </div>
        <div class="summary-card good">
          <div class="summary-icon"><i class="fas fa-check-circle"></i></div>
          <div class="summary-info">
            <div class="summary-num" id="avgGoodPct">-</div>
            <div class="summary-label">평균 양호 비율</div>
          </div>
        </div>
      </section>

      <!-- 전체 응답 분포 도넛 차트 -->
      <section class="chart-section">
        <div class="chart-card">
          <h2 class="chart-title"><i class="fas fa-chart-pie"></i> 전체 응답 분포</h2>
          <div class="chart-wrap" style="height:280px;">
            <canvas id="overallChart"></canvas>
          </div>
        </div>

        <!-- 카테고리별 위험도 레이더 차트 -->
        <div class="chart-card">
          <h2 class="chart-title"><i class="fas fa-spider"></i> 카테고리별 위험도</h2>
          <div class="chart-wrap" style="height:280px;">
            <canvas id="radarChart"></canvas>
          </div>
        </div>
      </section>

      <!-- 카테고리별 요약 -->
      <section class="cat-summary-section">
        <h2 class="section-title"><i class="fas fa-layer-group"></i> 카테고리별 분석</h2>
        <div class="cat-summary-grid" id="catSummaryGrid"></div>
      </section>

      <!-- 상위 위험 항목 TOP 15 -->
      <section class="ranking-section">
        <h2 class="section-title"><i class="fas fa-fire-alt"></i> 가장 많이 체크된 위험 항목 TOP 15</h2>
        <div class="ranking-list" id="rankingList"></div>
      </section>

      <!-- 항목별 상세 통계 -->
      <section class="detail-section">
        <h2 class="section-title"><i class="fas fa-list-alt"></i> 항목별 상세 통계</h2>
        <div class="detail-filter">
          <select id="catFilter" onchange="renderDetailTable()">
            <option value="all">전체 카테고리</option>
          </select>
          <select id="sortFilter" onchange="renderDetailTable()">
            <option value="danger">위험(맞다) 높은 순</option>
            <option value="id">문항 번호 순</option>
            <option value="good">양호(아니다) 높은 순</option>
          </select>
        </div>
        <div class="detail-table-wrap" id="detailTable"></div>
      </section>

    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
